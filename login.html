<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ · Data Area North</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="css/login.css">
  
  <!-- ✅ โหลด Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <!-- กลับไปหน้าหลัก -->
      <a href="index.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 3L5 7L9 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        กลับไปหน้าหลัก
      </a>
      
      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L20 7V17L12 22L4 17V7L12 2Z" stroke="white" stroke-width="2" fill="none"/>
            <path d="M12 8V16M8 12H16" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 class="login-title">เข้าสู่ระบบ</h1>
        <p class="login-subtitle">Data Area North Platform</p>
      </div>
      
      <!-- Form -->
      <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
        
        <!-- Email Field -->
        <div class="form-group">
          <label for="email">อีเมล</label>
          <input type="email" id="email" placeholder="ป้อนอีเมล" required autocomplete="email">
        </div>
        
        <!-- Password Field -->
        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" placeholder="ป้อนรหัสผ่าน" required autocomplete="current-password">
        </div>
        
        <!-- Error Message -->
        <div class="login-error" id="login-error">
          อีเมลหรือรหัสผ่านไม่ถูกต้อง
        </div>
        
        <!-- Submit Button -->
        <button type="submit" class="login-btn-primary" id="login-submit">
          เข้าสู่ระบบ
        </button>
      </form>
    </div>
  </div>

  <script>
    // ========== Supabase Configuration ==========
    // ✅ ใช้ let แทน const และเช็คก่อนประกาศ
    let supabaseClient;
    
    if (!window.supabaseClient) {
      const SUPABASE_URL = 'https://zfnualnoorhtdkrqwjpa.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmbnVhbG5vb3JodGRrcnF3anBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDkyNzEsImV4cCI6MjA5MDQyNTI3MX0._XuqPMrt9_Rx5aFybAqrxmKrlnU5g4JzKKz3aK2SORg';
      
      window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
    
    supabaseClient = window.supabaseClient;
    
    console.log('✅ Supabase client initialized');
    
    // ========== Login Logic ==========
    
    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email')?.value.trim();
      const password = document.getElementById('password')?.value;
      const submitBtn = document.getElementById('login-submit');
      
      // Validate input
      if (!email || !password) {
        showError('กรุณากรอกอีเมลและรหัสผ่าน');
        return;
      }
      
      // Show loading state
      submitBtn.disabled = true;
      submitBtn.textContent = 'กำลังตรวจสอบ...';
      hideError();
      
      console.log('🔍 Attempting login for:', email);
      
      try {
        // 🔐 ใช้ Supabase Auth สำหรับล็อกอิน
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password
        });
        
        console.log('📊 Auth result:', { data, error });
        
        if (error) {
          console.error('❌ Supabase Auth error:', error.message);
          
          // แปลงข้อความผิดพลาดให้เข้าใจง่าย
          if (error.message?.includes('Invalid login credentials')) {
            showError('อีเมลหรือรหัสผ่านไม่ถูกต้อง');
          } else if (error.message?.includes('Email not confirmed')) {
            showError('กรุณายืนยันอีเมลก่อนเข้าสู่ระบบ');
          } else {
            showError(error.message || 'เข้าสู่ระบบไม่สำเร็จ');
          }
          return;
        }
        
        // ✅ ล็อกอินสำเร็จ
        if (data?.user) {
          const user = data.user;
  
          const userProfile = {
            id: user.id,
            name: user.user_metadata?.name || user.email?.split('@')[0] || 'ผู้ใช้',
            email: user.email,
            role: user.user_metadata?.role || 'user',
            loggedIn: true,
            loginTime: new Date().toISOString()
          };
  
          // 💾 บันทึกสถานะใน localStorage
          localStorage.setItem('user', JSON.stringify(userProfile));
  
          console.log('🎉 Login success! Redirecting...', userProfile);
  
          // ✅ แสดง popup แจ้งเตือนก่อนเปลี่ยนหน้า
          showToast('🎉 ยินดีต้อนรับ!', `สวัสดี ${userProfile.name} เข้าสู่ระบบเรียบร้อยแล้ว`, 'success', 2500);
  
          // 🔄 เปลี่ยนหน้าหลังจากแสดง toast เล็กน้อย
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        }
        
      } catch (err) {
        console.error('💥 Login failed:', err);
        
        // แสดงข้อความที่อ่านง่าย
        let msg = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
        
        if (err.message?.includes('network')) {
          msg = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
        }
        
        showError(msg);
        
      } finally {
        // 🔘 คืนค่าปุ่ม
        submitBtn.disabled = false;
        submitBtn.textContent = 'เข้าสู่ระบบ';
      }
    }
    
    // ========== UI Helper Functions ==========
    
    function showError(msg) {
      const el = document.getElementById('login-error');
      if (el) {
        el.textContent = msg;
        el.classList.add('show');
        el.style.animation = 'shake 0.3s ease';
      }
    }
    
    function hideError() {
      const el = document.getElementById('login-error');
      if (el) {
        el.classList.remove('show');
        el.style.animation = '';
      }
    }

    function checkAuthRequired() {
      const userStr = localStorage.getItem('user');
      if (!userStr) {
        window.location.href = 'login.html';
        return false;
      }
      return true;
    }
    
    // ========== Check Auth Status ==========
    
    async function checkAuthStatus() {
      try {
        // ตรวจสอบว่ามีเซสชันจาก Supabase Auth หรือไม่
        const {  session } = await supabaseClient.auth.getSession();
        
        if (session?.user) {
          const user = session.user;
          const userProfile = {
            id: user.id,
            name: user.user_metadata?.name || user.email?.split('@')[0],
            email: user.email,
            role: user.user_metadata?.role || 'user',
            loggedIn: true,
            loginTime: new Date().toISOString()
          };
          
          localStorage.setItem('user', JSON.stringify(userProfile));
          console.log('✅ User already logged in via Supabase Auth:', userProfile.email);
          window.location.href = 'index.html';
          return;
        }
        
        // ตรวจสอบ localStorage เป็น fallback
        const userStr = localStorage.getItem('user');
        if (userStr) {
          const user = JSON.parse(userStr);
          const loginTime = new Date(user.loginTime);
          const now = new Date();
          const hoursDiff = (now - loginTime) / (1000 * 60 * 60);
          
          if (hoursDiff < 24) {
            console.log('✅ User already logged in (localStorage):', user.email);
            window.location.href = 'index.html';
          } else {
            console.log('⏰ Session expired, logging out');
            localStorage.removeItem('user');
          }
        }
      } catch (err) {
        console.error('Auth check error:', err);
        localStorage.removeItem('user');
      }
    }
    
    // ========== Initialize ==========
    
    document.addEventListener('DOMContentLoaded', () => {
      console.log('🚀 Login page loaded');
      checkAuthStatus();
    });

    function updateAuthUI() {
  const loggedOutEl = document.getElementById('auth-logged-out');
  const loggedInEl = document.getElementById('auth-logged-in');
  const userNameEl = document.getElementById('user-name');
  const userRoleEl = document.getElementById('user-role');
  const userAvatarEl = document.getElementById('user-avatar');
  
  if (!loggedOutEl || !loggedInEl) return;
  
  try {
    const userStr = localStorage.getItem('user');
    
    if (userStr) {
      const user = JSON.parse(userStr);
      
      // ตรวจสอบว่ายังล็อกอินอยู่ (ภายใน 24 ชม.)
      const loginTime = new Date(user.loginTime);
      const now = new Date();
      const hoursDiff = (now - loginTime) / (1000 * 60 * 60);
      
      if (hoursDiff < 24 && user.loggedIn) {
        // ✅ แสดงสถานะล็อกอิน
        loggedOutEl.style.display = 'none';
        loggedInEl.style.display = 'flex';
        
        // อัปเดตข้อมูลผู้ใช้
        if (userNameEl) userNameEl.textContent = user.name || user.username || 'ผู้ใช้';
        if (userRoleEl) userRoleEl.textContent = user.role || 'user';
        if (userAvatarEl) {
          const initial = (user.name || user.username || 'U').charAt(0).toUpperCase();
          userAvatarEl.textContent = initial;
          userAvatarEl.style.background = user.role === 'admin' 
            ? 'linear-gradient(135deg, #EF9F27, #B5721C)' 
            : 'linear-gradient(135deg, #1D9E75, #0F6E56)';
        }
        
        console.log('✅ User displayed:', user.username);
        return;
      }
    }
    
    // ❌ แสดงสถานะยังไม่ล็อกอิน
    loggedOutEl.style.display = 'block';
    loggedInEl.style.display = 'none';
    
  } catch (err) {
    console.error('updateAuthUI error:', err);
    localStorage.removeItem('user');
    loggedOutEl.style.display = 'block';
    loggedInEl.style.display = 'none';
  }
}

function showToast(title, message, type = 'success', duration = 3000) {
    const toast = document.getElementById('toast-notification');
    const icon = document.getElementById('toast-icon');
    const toastTitle = document.getElementById('toast-title');
    const toastMessage = document.getElementById('toast-message');
    
    if (!toast) return;
    
    // ตั้งค่าตามประเภท
    const styles = {
      success: {
        bg: '#E1F5EE',
        color: '#1D9E75',
        border: '#1D9E75',
        icon: '✓'
      },
      error: {
        bg: '#FCEBEB',
        color: '#E24B4A',
        border: '#E24B4A',
        icon: '✕'
      },
      info: {
        bg: '#E6F1FB',
        color: '#378ADD',
        border: '#378ADD',
        icon: 'ℹ'
      },
      logout: {
        bg: '#FFF4E6',
        color: '#EF9F27',
        border: '#EF9F27',
        icon: '👋'
      }
    };
    
    const style = styles[type] || styles.success;
    
    // อัปเดตเนื้อหา
    toastTitle.textContent = title;
    toastMessage.textContent = message;
    icon.textContent = style.icon;
    icon.style.background = style.bg;
    icon.style.color = style.color;
    toast.style.borderLeftColor = style.border;
    
    // แสดงและซ่อนอัตโนมัติ
    toast.classList.remove('hide');
    toast.style.display = 'block';
    
    // ซ่อนหลังจากเวลาที่กำหนด
    setTimeout(() => {
      hideToast();
    }, duration);
  }
  
  /**
   * ซ่อน toast notification
   */
  function hideToast() {
    const toast = document.getElementById('toast-notification');
    if (!toast) return;
    
    toast.classList.add('hide');
    setTimeout(() => {
      toast.style.display = 'none';
      toast.classList.remove('hide');
    }, 300);
  }

/*ออกจากระบบ*/
function handleLogout() {
  // ✅ แสดง popup แจ้งเตือนก่อนล็อก아웃
  showToast('👋 ออกจากระบบ', 'คุณได้ออกจากระบบเรียบร้อยแล้ว', 'logout', 2000);
  
  // ลบข้อมูลผู้ใช้หลังจากแสดง toast
  setTimeout(() => {
    localStorage.removeItem('user');
    
    // ถ้าใช้ Supabase Auth ให้ sign out ด้วย
    if (typeof supabaseClient !== 'undefined' && supabaseClient?.auth) {
      supabaseClient.auth.signOut().catch(err => console.warn('Sign out warning:', err));
    }
    
    // อัปเดต UI
    updateAuthUI();
    
    console.log('🔓 Logged out');
    
    // รีเฟรชหน้าปัจจุบัน
    window.location.reload();
  }, 1000);
}

/**
 * ตรวจสอบสถานะเมื่อโหลดหน้า
 */
function initAuthCheck() {
  document.addEventListener('DOMContentLoaded', () => {
    updateAuthUI();
  });
  
  // ฟังเหตุการณ์ storage change (สำหรับหลายแท็บ)
  window.addEventListener('storage', (e) => {
    if (e.key === 'user') {
      updateAuthUI();
    }
  });
}

// เรียกใช้งาน
initAuthCheck();
  </script>
  
  <!-- CSS สำหรับเอฟเฟกต์ -->
  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  </style>
  <div id="toast-notification" style="position:fixed;top:20px;right:20px;background:white;border-radius:12px;padding:16px 20px;box-shadow:0 8px 32px rgba(0,0,0,0.15);border-left:4px solid #1D9E75;display:none;z-index:9999;min-width:280px;animation:slideIn 0.3s ease;">
    <div style="display:flex;align-items:flex-start;gap:12px;">
      <div id="toast-icon" style="width:32px;height:32px;border-radius:50%;background:#E1F5EE;color:#1D9E75;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">✓</div>
      <div style="flex:1;min-width:0;">
        <div id="toast-title" style="font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:4px;">สำเร็จ</div>
        <div id="toast-message" style="font-size:12px;color:#666;line-height:1.4;">ดำเนินการเรียบร้อยแล้ว</div>
      </div>
      <button onclick="hideToast()" style="border:none;background:none;color:#aaa;cursor:pointer;font-size:18px;line-height:1;padding:0 4px;">✕</button>
    </div>
  </div>
  
  <!-- CSS Animation -->
  <style>
    @keyframes slideIn {
      from {
        transform: translateX(120%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(120%);
        opacity: 0;
      }
    }
    
    #toast-notification.hide {
      animation: slideOut 0.3s ease forwards;
    }
  </style>
</body>
</html>
